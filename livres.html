<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gestion des Livres</title>
</head>
<body>

  <!-- SIDEBAR -->
  <aside>
    <h2>📚 Bibliothèque</h2>
    <nav>
      <ul>
        <li><a href="ASLdashboard.html">Dashboard</a></li>
        <li><a href="livres.html">Livres</a></li>
        <li><a href="auteurs.html">Auteurs</a></li>
        <li><a href="adherents.html">Adhérents</a></li>
        <li><a href="emprunts.html">Emprunts</a></li>
        <li><a href="categories.html">Catégories</a></li>
      </ul>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main>

    <!-- HEADER -->
    <header>
      <h1>Gestion des Livres</h1>
      <input type="text" placeholder="Rechercher un livre">
    </header>

    <!-- FORM AJOUT LIVRE -->
    <section>
      <h2>Ajouter un livre</h2>

      <form>
        <div>
          <label>Titre</label>
          <input type="text" name="titre">
        </div>

        <div>
          <label>Auteur</label>
          <input type="text" name="auteur">
        </div>

        <div>
          <label>Catégorie</label>
          <input type="text" name="categorie">
        </div>

        <button type="submit">Ajouter</button>
      </form>
    </section>

    <!-- TABLE LIVRES -->
    <section>
      <h2>Liste des Livres</h2>

      <table border="1" width="100%">
        <thead>
          <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Auteur</th>
            <th>Catégorie</th>
            <th>Disponible</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>1</td>
            <td>1984</td>
            <td>George Orwell</td>
            <td>Roman</td>
            <td>Oui</td>
            <td>
              <button>Voir</button>
              <button>Modifier</button>
              <button>Supprimer</button>
            </td>
          </tr>
        </tbody>
      </table>
    </section>

  </main>

</body>
</html>
